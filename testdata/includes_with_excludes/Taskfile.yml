version: '3'

includes:
  included:
    taskfile: ./included/Taskfile.yml
    excludes:
        - foo
  included_flatten:
    taskfile: ./included/Taskfile.yml
    flatten: true
    excludes:
      - bar
  included_namespace:
    taskfile: ./included/Taskfile.yml
    excludes:
      - flight-recorder
  included_namespace_glob:
    taskfile: ./included/Taskfile.yml
    excludes:
      - flight-recorder:*

tasks:
  default:
    cmds:
      - echo "called_dep" > called_dep.txt
