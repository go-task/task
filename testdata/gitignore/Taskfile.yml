version: '3'

gitignore: true

tasks:
  build:
    cmds:
      - cp ./source.txt ./generated.txt
    sources:
      - ./*.txt
      - exclude: ./generated.txt
    generates:
      - ./generated.txt
    method: checksum

  build-no-gitignore:
    gitignore: false
    cmds:
      - cp ./source.txt ./generated.txt
    sources:
      - ./*.txt
      - exclude: ./generated.txt
    generates:
      - ./generated.txt
    method: checksum
