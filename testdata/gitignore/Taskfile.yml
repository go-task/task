version: '3'

use_gitignore: true

tasks:
  build:
    cmds:
      - cp ./source.txt ./generated.txt
    sources:
      - ./*.txt
      - exclude: ./generated.txt
    generates:
      - ./generated.txt
    method: checksum

  build-no-use_gitignore:
    use_gitignore: false
    cmds:
      - cp ./source.txt ./generated.txt
    sources:
      - ./*.txt
      - exclude: ./generated.txt
    generates:
      - ./generated.txt
    method: checksum
